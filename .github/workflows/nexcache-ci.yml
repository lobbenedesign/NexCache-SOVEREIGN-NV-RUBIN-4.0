name: NexCache CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config tcl8.6 tclx libssl-dev git libgtest-dev

    - name: Build NexCache (Rubin M3.3 Mode)
      run: |
        make -j$(nproc) RUBIN_MODE=1 EXTRA_CFLAGS="-D_GNU_SOURCE"
      continue-on-error: false

    - name: Verify Executables
      run: |
        ls -l src/nexcache-server
        ./src/nexcache-server --version

    - name: Run Core Tests (Stabilized)
      run: |
        # Usiamo --clients 1 per evitare race condition sui test TTL/Replication in CI
        # Timeout alzato a 1200 per gestire carichi pesanti in VERA-Mode
        ./runtest --verbose --tags -slow --dump-logs --timeout 1200 --clients 1
