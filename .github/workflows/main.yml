name: NexCache CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblz4-dev libzstd-dev libssl-dev pkg-config

    - name: Build NexCache
      run: |
        # Usiamo il Makefile professionale che gestisce SIMD in modo chirurgico
        make clean
        make all

    - name: Run Tests
      run: |
        ./build/test_arena
        ./build/test_core_v2
        ./build/test_v4
        ./build/test_advanced
